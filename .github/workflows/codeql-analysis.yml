name: "CodeQL"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "resource/lfs/locale/**"
      - "**.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "resource/lfs/locale/**"
      - "**.md"

  schedule:
    - cron: "19 14 * * 2"

env:
  BUILD_TYPE: Debug

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: manual
          - language: rust
            build-mode: none

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: "false"
          submodules: recursive

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: codeql-${{ github.job }}-${{ runner.os }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> build/cargo
          shared-key: rust-${{ runner.os }}-${{ env.BUILD_TYPE }}
          cache-on-failure: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Install Dependence
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential binutils git autoconf automake gettext texinfo
          sudo apt-get -y install gcc g++ ninja-build
          sudo apt-get -y install libarchive-dev libgpgme-dev libssl-dev libsodium-dev
          sudo apt-get -y install gpg
        if: matrix.language == 'cpp'

      - name: Build googletest
        run: |
          git clone --depth 1 --branch v1.15.0 https://github.com/google/googletest.git ${{github.workspace}}/third_party/googletest
          cd ${{github.workspace}}/third_party/googletest
          mkdir -p build && cd build
          cmake -G Ninja -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
        if: matrix.language == 'cpp'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          cache: "true"
        if: matrix.language == 'cpp'

      - name: Build GpgFrontend (Linux)
        run: |
          cmake -B ${{github.workspace}}/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DGPGFRONTEND_LINK_GPGME_INTO_CORE=ON
          cmake --build ${{github.workspace}}/build -- -v
        if: matrix.language == 'cpp'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
