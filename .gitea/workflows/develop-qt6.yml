name: Develop CI Qt6 Build & Test

on:
  push:
    branches: ["develop", "dev/**", "main"]
    paths-ignore:
      - "resource/lfs/locale/**"
      - "**.md"
env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    runs-on: ubuntu-latest-server
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: "false"
          submodules: recursive

      - name: Get Short SHA of Commit
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.gitea/workflows/develop-qt6.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install Dependence
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get -y install build-essential binutils git cmake ccache
          sudo apt-get -y install autoconf automake gettext texinfo
          sudo apt-get -y install gcc g++ ninja-build gnupg qtchooser qt6-base-dev qt6-base-dev-tools qt6-l10n-tools qt6-tools-dev qt6-tools-dev-tools libqt6svg6
          sudo apt-get -y install libarchive-dev libssl-dev libgpgme-dev libgl1-mesa-dev libfuse2 libsodium-dev

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ matrix.os }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache googletest
        id: cache-googletest
        uses: actions/cache@v3
        with:
          path: |
            ${{github.workspace}}/third_party/googletest
            /usr/local/lib/libgtest*
            /usr/local/lib/libgmock*
            /usr/local/include/gtest
            /usr/local/include/gmock
          key: ${{ runner.os }}-googletest-v1.15.0
          restore-keys: |
            ${{ runner.os }}-googletest-

      - name: Build googletest
        if: steps.cache-googletest.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.15.0 https://github.com/google/googletest.git ${{github.workspace}}/third_party/googletest
          cd ${{github.workspace}}/third_party/googletest
          mkdir build && cd build
          cmake -G Ninja -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install

      - name: Build GpgFrontend
        run: |
          cmake -B ${{github.workspace}}/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DGPGFRONTEND_LINK_GPGME_INTO_CORE=ON
          cmake --build ${{github.workspace}}/build --config {{$env.BUILD_TYPE}} -- -v

      - name: Run Unit Tests
        # Hard timeout so a hung test can never stall the pipeline forever.
        timeout-minutes: 20
        env:
          # CI has no X display; run Qt headless via the offscreen plugin.
          QT_QPA_PLATFORM: offscreen
        run: |
          # `timeout` gives a clean non-zero exit (124) if the suite wedges,
          # belt-and-suspenders alongside the step-level timeout-minutes above.
          timeout 900 scripts/run_tests.sh --no-build --unit-only \
            --build-dir ${{github.workspace}}/build

      - name: Run Stress Tests
        # Separate section so a slow/flaky stress run is isolated from the unit
        # gate and easy to spot in the pipeline.
        timeout-minutes: 30
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          timeout 1500 scripts/run_tests.sh --no-build --stress-only \
            --stress-iter 50 --build-dir ${{github.workspace}}/build

      - name: Run Algorithm Coverage Tests
        # Generates every declared key/subkey algorithm on each engine; slow
        # (PQC keygen), so it gets its own section with a generous timeout.
        timeout-minutes: 40
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          timeout 2100 scripts/run_tests.sh --no-build --coverage-only \
            --build-dir ${{github.workspace}}/build

      # Persist the sanitizer build tree so only the FIRST run pays the full
      # cold ASan rebuild; later runs restore build-asan/ and ninja relinks
      # incrementally (ccache also warms ~/.ccache for the instrumented objects).
      - name: Cache ASan build
        uses: actions/cache@v3
        with:
          path: ${{github.workspace}}/build-asan
          key: ${{ runner.os }}-build-asan-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-asan-

      - name: Run ASan/UBSan Stress Tests
        # Separate sanitized build (build-asan/, gcc + ASan/UBSan) that hunts for
        # memory corruption across the C++/Rust FFI boundary. It does a full
        # instrumented rebuild (cold on the first run, incremental afterwards via
        # the cache above) and runs the *Stress* suite, so it is the slowest
        # section and gets the most generous timeout.
        timeout-minutes: 120
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          timeout 6600 scripts/run_tests_asan.sh \
            --build-dir ${{github.workspace}}/build-asan \
            --stress-iter 200 \
            --log-level warn
